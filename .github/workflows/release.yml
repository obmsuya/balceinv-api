name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Go Sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build
        working-directory: ./balceinv-api
        run: |
          go build -ldflags="-H=windowsgui -s -w -X 'github.com/chrisostomemataba/balceinv-api/license.LicenseSecret=${{ secrets.BALCE_LICENSE_SECRET }}'" -o ../src-tauri/bin/backend-x86_64-pc-windows-msvc.exe .

  build-ubuntu:
    name: Build Go Sidecar (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build
        working-directory: ./balceinv-api
        run: |
          go build -ldflags="-s -w -X 'github.com/chrisostomemataba/balceinv-api/license.LicenseSecret=${{ secrets.BALCE_LICENSE_SECRET }}'" -o ../src-tauri/bin/backend-x86_64-unknown-linux-gnu .

  build-macos:
    name: Build Go Sidecar (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build
        working-directory: ./balceinv-api
        run: |
          go build -ldflags="-s -w -X 'github.com/chrisostomemataba/balceinv-api/license.LicenseSecret=${{ secrets.BALCE_LICENSE_SECRET }}'" -o ../src-tauri/bin/backend-x86_64-apple-darwin .
          GOARCH=arm64 go build -ldflags="-s -w -X 'github.com/chrisostomemataba/balceinv-api/license.LicenseSecret=${{ secrets.BALCE_LICENSE_SECRET }}'" -o ../src-tauri/bin/backend-aarch64-apple-darwin .
